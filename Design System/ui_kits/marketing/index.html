<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>RDI Technologies — Marketing UI Kit</title>
  <link rel="stylesheet" href="../../colors_and_type.css?v=4">
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; background: var(--bg-0); transition: background 200ms ease; }
    #root { min-height: 100vh; }

    /* Theme toggle — floating pill */
    .theme-toggle {
      position: fixed; top: 16px; right: 16px; z-index: 100;
      display: inline-flex; align-items: center; gap: 0;
      background: var(--bg-card);
      border: 1px solid var(--border-2);
      border-radius: 999px;
      padding: 3px;
      box-shadow: var(--shadow-1);
      font-family: var(--font-sans);
    }
    .theme-toggle button {
      display: inline-flex; align-items: center; gap: 6px;
      border: 0; background: transparent;
      padding: 6px 12px;
      border-radius: 999px;
      font: 600 11px/1 var(--font-sans);
      letter-spacing: 0.06em; text-transform: uppercase;
      color: var(--fg-3);
      cursor: pointer;
      transition: all 150ms ease;
    }
    .theme-toggle button.active {
      background: var(--bg-2);
      color: var(--fg-1);
      box-shadow: inset 0 0 0 1px var(--border-2);
    }
    .theme-toggle svg { width: 13px; height: 13px; }
  </style>
</head>
<body>
  <div class="theme-toggle" role="tablist" aria-label="Theme">
    <button data-theme-btn="light" class="active" aria-label="Light theme">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>
      Light
    </button>
    <button data-theme-btn="dark" aria-label="Dark theme">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      Dark
    </button>
  </div>

  <div id="root"></div>

  <script>
    (function() {
      const saved = localStorage.getItem('rdi-theme') || 'light';
      if (saved === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
      document.addEventListener('click', (e) => {
        const btn = e.target.closest('[data-theme-btn]');
        if (!btn) return;
        const t = btn.dataset.themeBtn;
        if (t === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
        else document.documentElement.removeAttribute('data-theme');
        localStorage.setItem('rdi-theme', t);
        document.querySelectorAll('[data-theme-btn]').forEach(b => {
          b.classList.toggle('active', b.dataset.themeBtn === t);
        });
      });
      // init button state
      document.addEventListener('DOMContentLoaded', () => {
        document.querySelectorAll('[data-theme-btn]').forEach(b => {
          b.classList.toggle('active', b.dataset.themeBtn === saved);
        });
      });
    })();
  </script>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="Nav.jsx?v=4"></script>
  <script type="text/babel" src="Hero.jsx?v=4"></script>
  <script type="text/babel" src="FeatureTriad.jsx?v=4"></script>
  <script type="text/babel" src="StatsBar.jsx?v=4"></script>
  <script type="text/babel" src="ProductCards.jsx?v=4"></script>
  <script type="text/babel" src="Testimonial.jsx?v=4"></script>
  <script type="text/babel" src="CTA.jsx?v=4"></script>

  <script type="text/babel">
    function App() {
      return (
        <>
          <Nav />
          <Hero />
          <FeatureTriad />
          <StatsBar />
          <ProductCards />
          <Testimonial />
          <CTA />
          <Footer />
        </>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
