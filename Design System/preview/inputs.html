<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Inputs</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 22px 28px; background: var(--bg-0); font-family: var(--font-sans); }
  .field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px; max-width: 380px; }
  label { font-size: 11px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--fg-3); }
  input, select { height: 40px; border: 1px solid var(--border-3); background: var(--bg-input); border-radius: var(--r-2); padding: 0 12px; color: var(--fg-1); font-size: 14px; font-family: inherit; transition: all 0.12s; }
  input:focus, select:focus { outline: none; border-color: var(--accent); box-shadow: var(--shadow-focus); }
  .row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .help { font-size: 11px; color: var(--fg-4); }
  .error { color: var(--red-500); }
  .filled { background: var(--bg-2); }
</style></head>
<body>
  <div class="row">
    <div class="field">
      <label>Asset name</label>
      <input value="Motor DE Bearing"/>
      <span class="help">Used across reports and analyses</span>
    </div>
    <div class="field">
      <label>Sample rate</label>
      <select><option>1400 FPS</option><option>700 FPS</option><option>240 FPS</option></select>
    </div>
  </div>
  <div class="row">
    <div class="field">
      <label>Email</label>
      <input placeholder="name@company.com" style="border-color: var(--red-500);"/>
      <span class="help error">Enter a valid corporate email address.</span>
    </div>
    <div class="field">
      <label>License key</label>
      <input class="filled" value="RDI-MX-24-8F3A-2026" readonly/>
    </div>
  </div>
</body></html>
