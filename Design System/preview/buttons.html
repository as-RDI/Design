<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Buttons</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 22px 28px; background: var(--bg-0); }
  .row { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
  .cap { font-family: var(--font-mono); font-size: 10px; color: var(--fg-3); width: 90px; }
  .sm { padding: 6px 14px; font-size: 12px; }
  .lg { padding: 14px 24px; font-size: 14px; }
</style></head>
<body>
  <div class="row">
    <span class="cap">Primary</span>
    <button class="rdi-btn sm">Request a demo</button>
    <button class="rdi-btn">Request a demo</button>
    <button class="rdi-btn lg">Request a demo</button>
  </div>
  <div class="row">
    <span class="cap">Ghost</span>
    <button class="rdi-btn rdi-btn--ghost sm">Learn more</button>
    <button class="rdi-btn rdi-btn--ghost">Learn more</button>
    <button class="rdi-btn rdi-btn--ghost lg">Learn more</button>
  </div>
  <div class="row">
    <span class="cap">Secondary</span>
    <button class="rdi-btn rdi-btn--secondary sm">Download PDF</button>
    <button class="rdi-btn rdi-btn--secondary">Download PDF</button>
  </div>
  <div class="row">
    <span class="cap">Link</span>
    <button class="rdi-btn rdi-btn--link">See how it works &nbsp;→</button>
  </div>
</body></html>
