<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Status & Accent</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 20px; background: var(--bg-0); font-family: var(--font-sans); }
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
  .sw { border: 1px solid var(--border-2); border-radius: var(--r-2); overflow: hidden; background: var(--bg-card); }
  .chip { height: 44px; display: flex; align-items: center; padding: 0 14px; gap: 10px; }
  .dot { width: 8px; height: 8px; border-radius: 99px; }
  .chip span { color: #fff; font-size: 12px; font-weight: 600; letter-spacing: 0.02em; }
  .meta { padding: 8px 14px; display: flex; justify-content: space-between; align-items: center; }
  .name { font-size: 11px; font-weight: 600; color: var(--fg-1); }
  .hex { font-family: var(--font-mono); font-size: 10px; color: var(--fg-3); }
  .section { font-size: 10px; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; color: var(--fg-3); margin: 0 0 10px; }
</style></head>
<body>
  <div class="section">Signal Colors · Instrument-panel semantics</div>
  <div class="grid">
    <div class="sw"><div class="chip" style="background:var(--status-pass)"><div class="dot" style="background:#fff"></div><span>IN SPEC</span></div><div class="meta"><span class="name">status-pass</span><span class="hex">#16A34A</span></div></div>
    <div class="sw"><div class="chip" style="background:var(--status-caution)"><div class="dot" style="background:#fff"></div><span>CAUTION</span></div><div class="meta"><span class="name">status-caution</span><span class="hex">#D97706</span></div></div>
    <div class="sw"><div class="chip" style="background:var(--status-alarm)"><div class="dot" style="background:#fff"></div><span>ALARM</span></div><div class="meta"><span class="name">status-alarm</span><span class="hex">#DC2626</span></div></div>
    <div class="sw"><div class="chip" style="background:var(--cyan-600)"><div class="dot" style="background:#fff"></div><span>DATA</span></div><div class="meta"><span class="name">accent-2</span><span class="hex">#0F6A83</span></div></div>
  </div>
</body></html>
