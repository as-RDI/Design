<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><title>Brand Mark</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; background: var(--bg-0); display:flex; align-items:center; gap:36px; padding: 28px 32px; font-family: var(--font-sans); }
  .mark-block { display:flex; align-items:center; gap:20px; }
  .mark-block img { width: 72px; height: 72px; }
  .tag { font-size: 10px; font-weight: 700; letter-spacing:.14em; text-transform:uppercase; color: var(--accent); }
  .title { font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 28px; line-height:1; color: var(--fg-1); letter-spacing:.01em; text-transform:uppercase; margin-top: 6px;}
  .sep { width: 1px; height: 72px; background: var(--border-2); }
  .rule { font-size: 14px; line-height: 1.5; color: var(--fg-2); max-width: 320px; }
</style></head>
<body>
  <div class="mark-block">
    <img src="../assets/brand-mark-iris.svg" alt="">
    <div>
      <div class="tag">Brand glyph</div>
      <div class="title">Iris Aperture</div>
    </div>
  </div>
  <div class="sep"></div>
  <div>
    <div class="tag" style="color: var(--fg-3)">Usage</div>
    <div class="rule" style="margin-top: 6px;">Reserved for logo lockups, app icons, and hero moments. Never as an inline UI icon.</div>
  </div>
</body></html>
