<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Mono Type</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 28px 32px; background: var(--bg-0); }
  .row { display: flex; align-items: center; gap: 22px; padding: 14px 0; border-bottom: 1px solid var(--border-1); }
  .row:last-child { border-bottom: 0; }
  .tag { font-family: var(--font-mono); font-size: 10px; color: var(--fg-3); width: 150px; }
  .stat { font-family: var(--font-display); font-weight: 700; font-size: 64px; line-height: 1; color: var(--accent); letter-spacing: -0.02em; font-feature-settings: 'tnum'; }
  .stat small { font-size: 14px; color: var(--fg-3); font-family: var(--font-sans); font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; margin-left: 8px; }
</style></head>
<body>
  <div class="row">
    <div class="tag">rdi-stat</div>
    <div class="stat">1,400<small>FPS</small></div>
    <div class="stat">62+<small>Countries</small></div>
  </div>
  <div class="row">
    <div class="tag">rdi-measurement</div>
    <div class="rdi-measurement" style="font-size: 20px;">0.0834 mils pk-pk</div>
    <div class="rdi-measurement" style="font-size: 20px;">241.6 Hz</div>
    <div class="rdi-measurement" style="font-size: 20px;">RMS 1.238</div>
  </div>
  <div class="row">
    <div class="tag">rdi-mono</div>
    <div class="rdi-mono">PUMP-04B · 2026-04-20 · 14:22:08 UTC</div>
  </div>
</body></html>
