<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Spacing</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 22px 28px; background: var(--bg-0); font-family: var(--font-sans); }
  .grid { display: grid; grid-template-columns: repeat(11, 1fr); gap: 4px; align-items: end; }
  .col { display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .bar { width: 100%; background: var(--accent); border-radius: 2px; }
  .tag { font-family: var(--font-mono); font-size: 9px; color: var(--fg-2); }
  .sz { font-family: var(--font-mono); font-size: 9px; color: var(--fg-3); }
  .section { font-size: 10px; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; color: var(--fg-3); margin-bottom: 10px; }
</style></head>
<body>
  <div class="section">4pt Base Scale</div>
  <div class="grid">
    <div class="col"><div class="bar" style="height: 4px"></div><span class="tag">sp-1</span><span class="sz">4</span></div>
    <div class="col"><div class="bar" style="height: 8px"></div><span class="tag">sp-2</span><span class="sz">8</span></div>
    <div class="col"><div class="bar" style="height: 12px"></div><span class="tag">sp-3</span><span class="sz">12</span></div>
    <div class="col"><div class="bar" style="height: 16px"></div><span class="tag">sp-4</span><span class="sz">16</span></div>
    <div class="col"><div class="bar" style="height: 24px"></div><span class="tag">sp-5</span><span class="sz">24</span></div>
    <div class="col"><div class="bar" style="height: 32px"></div><span class="tag">sp-6</span><span class="sz">32</span></div>
    <div class="col"><div class="bar" style="height: 48px"></div><span class="tag">sp-7</span><span class="sz">48</span></div>
    <div class="col"><div class="bar" style="height: 64px"></div><span class="tag">sp-8</span><span class="sz">64</span></div>
    <div class="col"><div class="bar" style="height: 96px"></div><span class="tag">sp-9</span><span class="sz">96</span></div>
    <div class="col"><div class="bar" style="height: 120px"></div><span class="tag">sp-10</span><span class="sz">128</span></div>
    <div class="col"><div class="bar" style="height: 140px; background: repeating-linear-gradient(45deg, var(--accent) 0 6px, var(--accent-hover) 6px 12px)"></div><span class="tag">section</span><span class="sz">128+</span></div>
  </div>
</body></html>
